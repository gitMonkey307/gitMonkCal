name: Build gitMonkCal

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          # The -derivedDataPath build flag forces the app into a folder we can see
          xcodebuild clean build \
            -project Calendar.xcodeproj \
            -scheme Calendar \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Moving the app from the new predictable 'build' folder
          mv build/Build/Products/Release-iphoneos/Calendar.app Payload/
          zip -r gitMonkCal.zip Payload
          mv gitMonkCal.zip gitMonkCal.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitMonkCal-Build
          path: gitMonkCal.ipa

name: gitMonkCal Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Opt into Node.js 24 for all JavaScript actions in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build gitMonkCal
    runs-on: macos-14 

    steps:
      # 1. Checkout Code using v5 (Node 24 Compatible)
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Select Xcode 16.x Version
      - name: Select Xcode Version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          echo "Selecting Xcode at $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      # 3. Install XcodeGen
      - name: Install XcodeGen
        run: brew install xcodegen

      # 4. Generate the gitMonkCal project
      - name: Generate Xcode Project
        run: xcodegen generate

      # 5. Build the App and Widget
      - name: Build App
        run: |
          xcodebuild clean build \
            -project gitMonkCal.xcodeproj \
            -scheme gitMonkCal \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 6. Verify the Build Artifact
      - name: Verify Build
        run: |
          if [ -d "build/Build/Products/Release-iphoneos/gitMonkCal.app" ]; then
            echo "✅ gitMonkCal build successful on Node 24!"
          else
            echo "❌ Build artifact not found."
            exit 1
          fi

name: Build gitMonkCal

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        # UPDATED: v6 natively supports the Node 24 runtime
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild clean build \
            -project Calendar.xcodeproj \
            -scheme Calendar \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv build/Build/Products/Release-iphoneos/Calendar.app Payload/
          zip -r gitMonkCal.zip Payload
          mv gitMonkCal.zip gitMonkCal.ipa

      - name: Upload Artifact
        # UPDATED: v7 is the 2026 standard for Node 24 support
        uses: actions/upload-artifact@v7
        with:
          name: gitMonkCal-Build
          path: gitMonkCal.ipa

name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

# THIS IS THE NEW FIX:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild clean build \
            -project Calendar.xcodeproj \
            -scheme Calendar \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/Calendar.app Payload/
          zip -r Calendar.zip Payload
          mv Calendar.zip Calendar.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calendar-App
          path: Calendar.ipa

name: gitMonkCal Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build gitMonkCal
    runs-on: macos-14 # macOS 14 runners have both Xcode 15 and 16

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # NEW: This step forces the runner to use Xcode 16.0
      - name: Select Xcode Version
        run: |
          # Finds the newest version of Xcode 16.x installed on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          echo "Selecting Xcode at $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild clean build \
            -project gitMonkCal.xcodeproj \
            -scheme gitMonkCal \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Verify Build
        run: |
          if [ -d "build/Build/Products/Release-iphoneos/gitMonkCal.app" ]; then
            echo "✅ gitMonkCal build successful!"
          else
            echo "❌ Build artifact not found."
            exit 1
          fi

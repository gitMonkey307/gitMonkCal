name: gitMonkCal Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build gitMonkCal
    runs-on: macos-14 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Select Xcode Version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild clean build \
            -project gitMonkCal.xcodeproj \
            -scheme gitMonkCal \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # NEW: Package as a proper .ipa for Sideloadly/AltStore
      - name: Package IPA
        run: |
          cd build/Build/Products/Release-iphoneos/
          mkdir Payload
          cp -r gitMonkCal.app Payload/
          zip -r gitMonkCal.ipa Payload
          rm -rf Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitMonkCal-Phone-Build
          path: build/Build/Products/Release-iphoneos/gitMonkCal.ipa
          retention-days: 5

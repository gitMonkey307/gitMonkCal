name: gitMonkCal Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build gitMonkCal
    runs-on: macos-14 # Uses the latest stable macOS runner with Xcode 15/16

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Install XcodeGen (Required to turn project.yml into .xcodeproj)
      - name: Install XcodeGen
        run: brew install xcodegen

      # 2. Generate the gitMonkCal project
      - name: Generate Xcode Project
        run: xcodegen generate

      # 3. Build the App and Widget
      # Note: We use the new 'gitMonkCal' name to avoid namespace collisions
      - name: Build App
        run: |
          xcodebuild clean build \
            -project gitMonkCal.xcodeproj \
            -scheme gitMonkCal \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 4. (Optional) Verify the Build Artifact exists
      - name: Verify Build
        run: |
          if [ -d "build/Build/Products/Release-iphoneos/gitMonkCal.app" ]; then
            echo "✅ gitMonkCal build successful!"
          else
            echo "❌ Build artifact not found."
            exit 1
          fi

name: Calendar
options:
  bundleIdPrefix: com.gitmonk

targets:
  Calendar:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Code
        excludes:
          - "AgendaWidget.swift"
    dependencies:
      - target: AgendaWidget
        embed: true
    settings:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.gitmonk.Calendar
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "gitMonkCal needs access to manage your schedule."
      INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "gitMonkCal needs access to sync your tasks."

  AgendaWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Code/AgendaWidget.swift
      - Code/AppEvent.swift
      - Code/DesignSystem.swift
      - Code/EventKitManager.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.gitmonk.Calendar.AgendaWidget
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
      INFOPLIST_KEY_CFBundleDisplayName: gitMonk Agenda
